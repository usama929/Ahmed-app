<!DOCTYPE html>
<html>

<head>

<title>Furniture Products</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2>Our Furniture Collection</h2>

</header>

<section class="controls">

<input id="search" placeholder="Search furniture">

<select id="category">

<option value="all">All</option>
<option value="sofa">Sofa</option>
<option value="bed">Beds</option>
<option value="chair">Chairs</option>
<option value="cupboard">Cupboards</option>
<option value="almirah">Almirah</option>
<option value="bedding">Bedding</option>
<option value="table">Dining Table</option>

</select>

</section>

<section id="productList" class="grid"></section>

<div id="modal" class="modal">

<img id="modalImg">

</div>

<script src="script.js"></script>

</body>
</html>
